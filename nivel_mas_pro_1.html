<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurante Sabor</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* NAV */
.nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #111;
  color: white;
  padding: 15px 30px;
}

/* HERO */
.hero {
  height: 80vh;
  background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
              url('https://picsum.photos/1600/900');
  background-size: cover;
  background-position: center;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  color: white;
}

/* BOTÓN */
.btn {
  background: #e63946;
  padding: 12px 20px;
  color: white;
  text-decoration: none;
  border-radius: 5px;
}

/* SECCIONES */
.section {
  padding: 50px;
  text-align: center;
}

/* TARJETAS */
.cards {
  display: flex;
  justify-content: center;
  gap: 20px;
}

.card {
  width: 200px;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  transition: 0.3s;
  opacity: 0;
  transform: translateY(20px);
  animation: aparecer 1s forwards;
}

.card:hover {
  transform: scale(1.05);
}

/* ANIMACIÓN */
@keyframes aparecer {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* TESTIMONIOS */
.testimonios {
  background: #f5f5f5;
}

/* CTA */
.cta {
  background: #111;
  color: white;
}

/* WHATSAPP */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  padding: 15px;
  border-radius: 50%;
  color: white;
  text-decoration: none;
}

/* RESPONSIVE */
@media (max-width: 768px) {

  .cards {
    flex-direction: column;
    align-items: center;
  }

  .hero {
    height: 60vh;
    padding: 20px;
  }

  .nav {
    flex-direction: column;
    text-align: center;
  }

  h1 {
    font-size: 24px;
  }

  .card {
    width: 90%;
  }
}
</style>

</head>

<body>

<!-- NAV -->
<div class="nav">
  <h2>🍔 Restaurante Sabor</h2>
</div>

<!-- HERO -->
<section class="hero">
  <div>
    <h1>La mejor comida de la ciudad</h1>
    <p>Ordena fácil por WhatsApp</p>
    <a class="btn" href="https://wa.me/5215512345678?text=Hola%20quiero%20ordenar">Ordenar ahora</a>
  </div>
</section>

<!-- MENÚ -->
<section class="section">
  <h2>Menú</h2>
  <div class="cards">
    <div class="card">
      <h3>Hamburguesa</h3>
      <p>$120</p>
    </div>
    <div class="card">
      <h3>Tacos</h3>
      <p>$80</p>
    </div>
    <div class="card">
      <h3>Pizza</h3>
      <p>$150</p>
    </div>
  </div>
</section>

<!-- TESTIMONIOS -->
<section class="section testimonios">
  <h2>Opiniones</h2>
  <div class="cards">
    <div class="card">
      <p>"Rápido y delicioso"</p>
      <strong>- Juan</strong>
    </div>
    <div class="card">
      <p>"Excelente servicio"</p>
      <strong>- María</strong>
    </div>
  </div>
</section>

<!-- CTA -->
<section class="section cta">
  <h2>¿Listo para ordenar?</h2>
  <a class="btn" href="https://wa.me/5215512345678">Pedir ahora</a>
</section>

<!-- CONTACTO -->
<section class="section">
  <h2>Contacto</h2>
  <p>📍 Centro, CDMX</p>
  <p>📞 55 1234 5678</p>
</section>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/5215512345678">💬</a>

</body>
</html>
